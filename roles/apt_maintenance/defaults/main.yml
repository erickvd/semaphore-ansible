# Comportement général
apt_check_only: false
apt_skip_upgrade: false

# Options apt
apt_upgrade_type: dist
apt_autoremove: true
apt_autoclean: true
apt_cache_valid_time: 3600

# Options reboot (serveurs)
apt_reboot_timeout: 300
apt_reboot_pre_delay: 10
apt_reboot_post_delay: 30

# Valeurs par défaut de sécurité
apt_result:
  stdout_lines: []
  changed: false
reboot_pkgs:
  content: ""
