---
# playbook_reboot.yml

- name: Reboot des serveurs si nécessaire (hors Semaphore)
  hosts: '{{ HOSTS | default("ubuntu_servers,proxmox_servers") }}'
  become: true

  tasks:

    - name: Vérification si un reboot est nécessaire
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot de la machine
      ansible.builtin.reboot:
        msg: "Reboot déclenché par Ansible"
        reboot_timeout: 300
        pre_reboot_delay: 10
        post_reboot_delay: 30
        test_command: uptime
      when: reboot_required.stat.exists and inventory_hostname != 'ansible.lan.ekla-danse.be'

    - name: Marquer Semaphore pour reboot
      ansible.builtin.set_fact:
        reboot_semaphore: true
      when: reboot_required.stat.exists and inventory_hostname == 'ansible.lan.ekla-danse.be'

    - name: Afficher le statut
      vars:
        needed: >
          {% if reboot_required.stat.exists %}
          ✅ Reboot effectué avec succès.
          {% else %}
          ℹ️  Aucun reboot nécessaire.
          {% endif %}
      ansible.builtin.debug:
        msg:
          - "{{ needed | trim }}"
      when: inventory_hostname != 'ansible.lan.ekla-danse.be'

- name: Reboot de Semaphore en dernier
  hosts: ansible.lan.ekla-danse.be
  become: true

  tasks:

    - name: Programmer le reboot de Semaphore via at
      ansible.builtin.shell: |
        set -o pipefail
        echo "shutdown -r now" | at now + 1 minute
      args:
        executable: /bin/bash
      changed_when: false
      when: hostvars['ansible.lan.ekla-danse.be']['reboot_semaphore'] | default(false)

    - name: Afficher le statut
      vars:
        needed: >
          {% if hostvars['ansible.lan.ekla-danse.be']['reboot_semaphore'] | default(false) %}
          ✅ Reboot programmé dans 1 minute.
          {% else %}
          ℹ️  Aucun reboot nécessaire.
          {% endif %}
      ansible.builtin.debug:
        msg:
          - "{{ needed | trim }}"
