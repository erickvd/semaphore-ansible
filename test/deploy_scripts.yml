---
- name: "Deploiement de scripts"
  hosts: "{{ HOSTS | default([]) }}"
  become: true
  gather_facts: false
  handlers:
    - name: "Importation des handlers"
      ansible.builtin.import_tasks: handlers/main.yml

  tasks:
    - name: Collecter les infos des paquets installés
      ansible.builtin.package_facts:
        manager: auto

    - name: Vérifier si les cibles sont UP
      ansible.builtin.ping:
      ignore_unreachable: true
      register: ping_results

    # Si la machine est injoignable, on affiche un Warning
    - name: "Alerte : Machine hors-ligne"
      ansible.builtin.debug:
        msg: "⚠️ ATTENTION : L'hôte {{ inventory_hostname }} est injoignable. Passage à la suite."
      when: ping_results.unreachable is defined and ping_results.unreachable

    - name: Ignorer les machines injoignables
      when: ping_results.ping is defined
      block:
        - name: Ensure script directory exist
          ansible.builtin.file:
            path: /root/scripts
            state: directory
            mode: '0700'

        - name: Installation de curl
          ansible.builtin.package:
            name: curl
            state: present

        - name: Copier les scripts de déploiement
          ansible.builtin.copy:
            src: "scripts_root/"
            dest: "/root/scripts/"
            mode: '0700'

        - name: Générer le fichier .env à partir du template
          ansible.builtin.template:
            src: env.j2         # Ansible cherche tout seul dans le dossier /templates
            dest: /root/scripts/.env
            mode: '0600'

        # --- CONFIGURATION SERVEURS ---
        - name: Configuration des taches de maintenance pour les serveurs Ubuntu
          when: "'ubuntu_servers' in group_names"
          block:
            - name: "(ubuntu_servers) Cron : Check updates chaque samedi à 10h"
              ansible.builtin.cron:
                name: "Check updates weekly"
                minute: "0"
                hour: "10"
                weekday: "6"
                user: root
                job: "/root/scripts/check-updates.sh"

            - name: "(ubuntu_servers) Cron : Check updates chaque samedi à 11h"
              ansible.builtin.cron:
                name: "Check release weekly"
                minute: "0"
                hour: "11"
                weekday: "6"
                user: root
                job: "/root/scripts/check-releases.sh"

        # --- CONFIGURATION DESKTOPS ---
        - name: Configuration des tâches de maintenance pour les desktops Ubuntu
          when: "'ubuntu_desktops' in group_names"
          block:
            - name: "(ubuntu_desktops) Systemd : Création du service updates"
              ansible.builtin.copy:
                dest: /etc/systemd/system/check-updates.service
                owner: root
                group: root
                mode: '0644'
                content: |
                  [Unit]
                  Description=Vérification des mises à jour (Mode Desktop)
                  [Service]
                  Type=oneshot
                  ExecStart=/root/scripts/check-updates.sh
              notify: "Daemon_reload"

            - name: "(ubuntu_desktops) Systemd : Création du timer (10min boot + hebdomadaire)"
              ansible.builtin.copy:
                dest: /etc/systemd/system/check-updates.timer
                owner: root
                group: root
                mode: '0644'
                content: |
                  [Unit]
                  Description=Lance le script 10min après boot et 1x par semaine
                  [Timer]
                  OnBootSec=10min
                  OnUnitActiveSec=1w
                  Persistent=true
                  [Install]
                  WantedBy=timers.target
              notify: "Daemon_reload"

            - name: "(ubuntu_desktops) Systemd : Création du service releases"
              ansible.builtin.copy:
                dest: /etc/systemd/system/check-releases.service
                owner: root
                group: root
                mode: '0644'
                content: |
                  [Unit]
                  Description=Vérification des releases (Mode Desktop)
                  [Service]
                  Type=oneshot
                  ExecStart=/root/scripts/check-releases.sh
              notify: "Daemon_reload"

            - name: "(ubuntu_desktops) Systemd : Création du timer releases (10min boot + hebdomadaire)"
              ansible.builtin.copy:
                dest: /etc/systemd/system/check-releases.timer
                owner: root
                group: root
                mode: '0644'
                content: |
                  [Unit]
                  Description=Lance le script 10min après boot et 1x par semaine
                  [Timer]
                  OnBootSec=10min
                  OnUnitActiveSec=1w
                  Persistent=true
                  [Install]
                  WantedBy=timers.target
              notify: "Daemon_reload"

            - name: Forcer l'exécution du daemon-reload avant activation
              ansible.builtin.meta: flush_handlers

            - name: "(ubuntu_desktops) Systemd : Activation et démarrage du timer"
              ansible.builtin.systemd_service:
                name: check-updates.timer
                state: started
                enabled: true
              check_mode: false

            - name: "(ubuntu_desktops) Systemd : Activation et démarrage du timer"
              ansible.builtin.systemd_service:
                name: check-releases.timer
                state: started
                enabled: true
              check_mode: false

            - name: "(RSYSLOGD) Activation module imjournal"
              ansible.builtin.lineinfile:
                path: /etc/rsyslog.conf
                line: "module(load=\"imjournal\")"
                insertafter: '^module\\(load="imuxsock"\\)'
              notify: "Restart rsyslog"

            - name: "(JOURNALD) Création du dossier journal.conf.d"
              ansible.builtin.file:
                path: /etc/systemd/journald.conf.d
                owner: root
                group: root
                mode: '0755'
                state: directory

            - name: "(JOURNALD) Configuration RateLimit"
              ansible.builtin.copy:
                dest: /etc/systemd/journald.conf.d/ratelimit.conf
                owner: root
                group: root
                mode: '0644'
                content: |
                  [Journal]
                  RateLimitIntervalSec=10s
                  RateLimitBurst=100
                  SystemMaxUse=500M
              notify: "Restart systemd-journald"

            - name: "Suppression delaycompress dans logrotate"
              ansible.builtin.replace:
                path: "{{ item }}"
                regexp: '^\s*delaycompress\s*$'
                replace: ''
              with_fileglob:
                - /etc/logrotate.d/*

            - name: "Configurer les logs pour 1Password"
              when: "'1password' in ansible_facts.packages"
              ansible.builtin.copy:
                dest: /etc/rsyslog.d/10-drop-1password.conf
                owner: root
                group: root
                mode: '0644'
                content: |
                  if ( $programname startswith "1password") and ($syslogseverity >=6) then stop
                  if $syslogfacility-text == "kern" and $msg contains "snap.1password" then stop
              notify: "Restart rsyslog"

            - name: "Discord ?"
              ansible.builtin.command: snap list discord
              failed_when: false
              changed_when: false
              register: discord_check

            - name: "Configurer les logs pour Discord"
              when: discord_check.rc == 0
              ansible.builtin.copy:
                dest: /etc/rsyslog.d/11-drop-discord.conf
                owner: root
                group: root
                mode: '0644'
                content: |
                  if $programname startswith "discord" then stop
                  if $programname startswith "Discord" then stop
                  if $msg contains "apparmor=\"DENIED\"" and $msg contains "snap.discord" then stop
                  if $syslogfacility-text == "kern" and $msg contains "snap.discord" then stop
              notify: "Restart rsyslog"

            - name: "Discord - Vérification system-observe"
              ansible.builtin.command: snap connections discord
              register: discord_connections
              failed_when: false
              changed_when: false
              when: discord_check.rc == 0

            - name: "Brave ?"
              ansible.builtin.command: snap list brave
              failed_when: false
              changed_when: false
              register: brave_check

            - name: "Configurer les logs pour Brave"
              when: brave_check.rc == 0
              ansible.builtin.copy:
                dest: /etc/rsyslog.d/12-drop-brave.conf
                owner: root
                group: root
                mode: '0644'
                content: |
                  if $programname startswith "brave" then stop
                  if $programname startswith "Brave" then stop
                  if $msg contains "apparmor=\"DENIED\"" and $msg contains "snap.brave" then stop
                  if $syslogfacility-text == "kern" and $msg contains "snap.brave" then stop
              notify: "Restart rsyslog"

            - name: "Pas de DING dans les logs"
              ansible.builtin.copy:
                dest: /etc/rsyslog.d/13-ding.conf
                owner: root
                group: root
                mode: '0644'
                content: |
                  if $msg contains "DING:" then stop
              notify: "Restart rsyslog"

            - name: "Discord - Information system-observe"
              ansible.builtin.debug:
                msg: "system-observe n'est pas accordé à Discord. Vous pouvez l'activer avec: snap connect discord:system-observe"
              when:
                - discord_check.rc == 0
                - "'system-observe' not in discord_connections.stdout"
